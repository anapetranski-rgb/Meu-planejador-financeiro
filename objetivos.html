<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Elms+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <title>Planejador Financeiro</title>
    </head>

    <body>

       <header class="header-interno">
            <nav class="nav-interno">
                <a href="index.html" class="link-header">Home</a>
                <a href="planejamento.html" class="link-header">Planejamento</a>
                <a href="objetivos.html" class="link-header">Objetivos</a>
                <a href="visualizar-imagem.html" class="link-header">Quadro</a>
                <a href="progresso.html" class="link-header">Progresso</a>
            </nav>
            <button class="button-header-interno">Salve sua planilha</button>
        </header>

        <main class="main-interno">
            <section class="cards-objetivos">
                <div class="prazos">
                    <div class="wrapper-objetivo wrapper-curto">
                        <h3 class="card-meta">Curto prazo</h3>

                        <label for="nome-curto">Nome do objetivo:</label>
                        <input class="input-objetivo" id="nome-curto" placeholder="Nomeie o objetivo"/>

                        <label for="vt-curto">Valor total do objetivo:</label>
                        <input class="input-objetivo" id="vt-curto" placeholder="Valor total" type="number"/>

                        <label for="vf-curto">Valor que falta para o objetivo:</label>
                        <input class="input-objetivo" id="vf-curto" placeholder="Valor que falta" type="number"/>

                        <button class="btn-atualizar">Atualizar</button>
                    </div>

                    <div class="wrapper-objetivo wrapper-medio">
                        <h3 class="card-meta">Médio prazo</h3>

                        <label for="nome-medio">Nome do objetivo:</label>
                        <input class="input-objetivo" id="nome-medio" placeholder="Nomeie o objetivo"/>

                        <label for="vt-medio">Valor total do objetivo:</label>
                        <input class="input-objetivo"id="vt-medio" placeholder="Valor total" type="number"/>

                        <label for="vf-medio">Valor que falta para o objetivo:</label>
                        <input class="input-objetivo" id="vf-medio" placeholder="Valor que falta" type="number"/>

                        <button class="btn-atualizar">Atualizar</button>
                    </div>

                    <div class="wrapper-objetivo wrapper-longo">
                        <h3 class="card-meta">Longo prazo</h3>

                        <label for="nome-longo">Nome do objetivo:</label>
                        <input class="input-objetivo" id="nome-longo" placeholder="Nomeie o objetivo"/>

                        <label for="vt-longo">Valor total do objetivo:</label>
                        <input class="input-objetivo" id="vt-longo" placeholder="Valor total" type="number"/>

                        <label for="vf-longo">Valor que falta para o objetivo:</label>
                        <input class="input-objetivo" id="vf-longo" placeholder="Valor que falta" type="number"/>

                        <button class="btn-atualizar">Atualizar</button>
                    </div>
                </div>

                <aside class="caixa-checklist" id="mural-metas">
                    <h3>Checklist</h3>
                        <div id="lista-checkbox">
                            <div class="item-checklist">
                                <input type="checkbox" id="meta-dinamica-1">
                                <label for="meta-dinamica-1">Academia paga</label>
                            </div>

                            <div class="item-checklist">
                                <input type="checkbox" id="meta-dinamica-2">
                                <label for="meta-dinamica-2">Comprar ingredientes do café</label>
                            </div>

                            <div class="item-checklist">
                                <input type="checkbox" id="meta-dinamica-3">
                                <label for="meta-dinamica-3">Estudar Flexbox</label>
                            </div>
                        </div>
                </aside>

            </section>

            <footer class="footer-interno">Planejador Financeiro - João e Ana</footer>

        </main>
    </body>
